<div class="profile-container animate-fadein" *ngIf="currentUser$ | async as user; else noUser">
    <p-card styleClass="profile-card shadow-4">
        <div class="flex flex-column align-items-center mb-5">
            <p-avatar 
                [label]="getInitials(user.email)" 
                size="xlarge" 
                shape="circle" 
                styleClass="profile-avatar mb-3">
            </p-avatar>
            <h2 class="m-0 font-bold">{{ user.email }}</h2>
            <span class="text-500">{{ getUserRole() }}</span>
        </div>

        <div class="grid formgrid p-fluid">
            <div class="field col-12 md:col-6">
                <label for="email" class="font-semibold block mb-2">Email Address</label>
                <p-iconfield>
                    <p-inputicon class="pi pi-envelope"></p-inputicon>
                    <input pInputText id="email" [value]="user.email" [disabled]="true" class="w-full" />
                </p-iconfield>
            </div>
            <div class="field col-12 md:col-6">
                <label for="role" class="font-semibold block mb-2">User Role</label>
                <p-iconfield>
                    <p-inputicon class="pi pi-shield"></p-inputicon>
                    <input pInputText id="role" [value]="getUserRole()" [disabled]="true" class="w-full" />
                </p-iconfield>
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex justify-content-end gap-2">
                <p-button label="Edit Profile" icon="pi pi-pencil" [outlined]="true" severity="secondary"></p-button>
                <p-button label="Save Changes" icon="pi pi-check" severity="primary" [disabled]="true"></p-button>
            </div>
        </ng-template>
    </p-card>
</div>

<ng-template #noUser>
    <div class="profile-container animate-fadein">
        <p-card styleClass="profile-card shadow-4">
            <div class="flex flex-column align-items-center p-5 text-center">
                <i class="pi pi-user-slash text-6xl mb-4 text-500"></i>
                <h3 class="m-0 mb-2">No Profile Found</h3>
                <p class="text-500 mb-4">We couldn't retrieve your profile information. Please ensure you are logged in.</p>
                <p-button label="Sign In" icon="pi pi-sign-in" routerLink="/login"></p-button>
            </div>
        </p-card>
    </div>
</ng-template>
