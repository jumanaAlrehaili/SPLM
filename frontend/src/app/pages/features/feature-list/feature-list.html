<p-toast></p-toast>
<div class="features-wrapper">
  <div class="flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h3 class="m-0 text-900 font-bold">Features List</h3>
      <p class="text-secondary text-sm m-0 mt-1">Manage and track all system features for this project.</p>
    </div>
    <p-button *ngIf="isBusinessAnalyst()" label="Add Feature" icon="pi pi-plus" severity="primary" class="shadow-1"
      (click)="openAddFeatureDialog()">
    </p-button>
  </div>

  <!-- Search toggle -->
  <div class="flex justify-content-between align-items-center gap-2 flex-wrap mb-2">
    @if (showSearch) {
    <div class="flex align-items-center gap-2 flex-wrap">
      <p-iconfield>
        <p-inputicon class="pi pi-search"></p-inputicon>
        <input type="text" pInputText placeholder="Search by name..." [(ngModel)]="searchName" />
      </p-iconfield>
      <p-select [options]="priorityOptions" [(ngModel)]="searchPriority" optionLabel="label" optionValue="value"
        placeholder="Priority" appendTo="body" [showClear]="true"></p-select>
      <p-select [options]="statusOptions" [(ngModel)]="searchStatusId" optionLabel="label" optionValue="value"
        placeholder="Status" appendTo="body" [showClear]="true"></p-select>
      <p-button label="Search" icon="pi pi-search" (onClick)="search()"></p-button>
      @if (isSearchMode) {
      <p-button label="Clear" icon="pi pi-times" severity="secondary" [outlined]="true"
        (onClick)="clearSearch()"></p-button>
      }
    </div>
    }
    <p-button [icon]="showSearch ? 'pi pi-times' : 'pi pi-search'" [rounded]="true" [text]="true"
      [pTooltip]="showSearch ? 'Close search' : 'Search features'" tooltipPosition="bottom"
      (onClick)="toggleSearch()"></p-button>
  </div>

  <p-table #featuresTable [value]="features()" [loading]="loading()" [paginator]="true" [rows]="pageSize"
    [rowsPerPageOptions]="[5, 10, 20]" [lazy]="true" [totalRecords]="totalRecords" (onLazyLoad)="onPageChange($event)"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} features"
    class="p-datatable-striped shadow-1 border-round overflow-hidden">

    <ng-template pTemplate="header">
      <tr>
        <th style="width: 20%">Title</th>
        <th style="width: 25%">Description</th>
        <th style="width: 10%">Priority</th>
        <th style="width: 13%">Status</th>
        <th style="width: 13%">Epic Link</th>
        <th style="width: 10%" class="text-center">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-feature>
      <tr>
        <td class="font-semibold text-900">{{ feature.title }}</td>
        <td>
          <span class="text-secondary block text-overflow-ellipsis overflow-hidden whitespace-nowrap"
            style="max-width: 220px;" [title]="feature.description">
            {{ feature.description }}
          </span>
        </td>
        <td>
          <p-tag [value]="getPriorityLabel(feature.priorityId)"
            [severity]="getPrioritySeverity(feature.priorityId)"></p-tag>
        </td>
        <!-- <td class="text-700">{{ feature.deadline | date:'mediumDate' }}</td> -->
        <td>
          <p-tag [value]="feature.status" [severity]="getStatusSeverity(feature.status)"></p-tag>
        </td>
        <td style="white-space: nowrap;">
          <a *ngIf="feature.epicLink" [href]="feature.epicLink" target="_blank"
            class="text-primary font-bold text-sm hover:underline flex align-items-center gap-1"
            pTooltip="Open in Jira">
            View Link <i class="pi pi-external-link text-xs"></i>
          </a>
          <span *ngIf="!feature.epicLink" class="text-color-secondary text-sm">-</span>
        </td>

        <td class="text-center">
          <div class="flex justify-content-center gap-1">
            <p-button icon="pi pi-eye" [text]="true" severity="info" (click)="viewFeature(feature.id)"></p-button>

            <p-button *ngIf="isBusinessAnalyst()" icon="pi pi-pencil" [text]="true" severity="warn"
              (click)="editFeature(feature)"></p-button>

            <p-button *ngIf="isBusinessAnalyst()" icon="pi pi-trash" [text]="true" severity="danger"
              (click)="deleteFeature(feature.id)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center p-5 text-muted">
          <i class="pi pi-folder-open text-3xl block mb-2"></i>
          No features found for this project yet.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [header]="selectedFeature() ? 'Edit Feature' : 'Create New Feature'" [(visible)]="displayFormDialog"
  [modal]="true" [style]="{ width: '50vw' }" [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }" [draggable]="false"
  [resizable]="false" styleClass="custom-form-dialog">
  <app-feature-form *ngIf="displayFormDialog()" [projectId]="projectId" [featureData]="selectedFeature()"
    (onClose)="closeFormDialog(); fetchFeatures(currentPage, pageSize)">
  </app-feature-form>
</p-dialog>
